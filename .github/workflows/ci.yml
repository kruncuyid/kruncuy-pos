name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install backend
        working-directory: backend
        run: npm ci
      - name: Lint backend
        working-directory: backend
        run: npm run lint
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kruncuy_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install backend
        working-directory: backend
        run: npm ci
      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/kruncuy_test?schema=public
      - name: Push schema
        working-directory: backend
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/kruncuy_test?schema=public
      - name: Seed data
        working-directory: backend
        run: node prisma/seed.js
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/kruncuy_test?schema=public
          JWT_SECRET: ci-test-secret
      - name: Run tests
        working-directory: backend
        run: npm test
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/kruncuy_test?schema=public
          JWT_SECRET: ci-test-secret
      - name: Run frontend tests
        working-directory: frontend
        run: npm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
