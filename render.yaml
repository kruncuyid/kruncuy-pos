services:
  - type: web
    name: kruncuy-pos-api
    runtime: node
    repo: https://github.com/kruncuyid/kruncuy-pos
    plan: free
    branch: main
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://frontend-ten-dun-20.vercel.app
